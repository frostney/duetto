name: CI

# Two-stage post-merge confirmation, mirroring the lwpt / GocciaScript
# CI pattern. Sister workflow:
#
#   pr.yml — every PR: fast Ubuntu-native gate (the authoritative
#            pre-merge signal).
#
# ci.yml runs ONLY on push to main + manual dispatch. PRs do not
# trigger ci.yml — pr.yml owns the PR flow. This avoids the
# duplicate-build cost of triggering on both push and pull_request for
# the same commit; post-merge, ci.yml runs once on main to confirm the
# merged tree is green everywhere.
#
#   test:     Per-platform native runners. Every leg builds all five
#             programs and runs the unit suites, wsinterop's
#             live-socket battery, and the crosscheck against the
#             python `websockets` reference — the server rides the
#             platform transport (epoll on Linux, Network.framework on
#             macOS, where crosscheck is the merge-time conformance
#             battery since the Autobahn container can't run there).
#
#   autobahn: The Autobahn fuzzing suite (crossbario/autobahn-testsuite
#             via Docker) in both directions — fuzzingclient against
#             build/wsecho (server under test) and fuzzingserver
#             against build/wsautobahn (client under test, with and
#             without permessage-deflate). tools/autobahn-check.py
#             fails the job on any non-acceptable case; the full HTML
#             reports are uploaded as an artifact either way.
#
# The lwpt toolchain comes from its published release (checksum-
# verified per-platform tarball, no sibling checkout, no bootstrap);
# dependencies resolve from the same release tag and are verified
# against the committed lockfile + .lwpt/modules tree via
# install --frozen.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  LWPT_VERSION: "0.2.0"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runner: ubuntu-latest
            lwpt-asset: linux-x64
            fpc-install: apt
            format-check: true   # one runner runs format-check (platform-independent)
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
            lwpt-asset: linux-arm64
            fpc-install: apt
          - target: aarch64-darwin
            runner: macos-latest
            lwpt-asset: macos-arm64
            fpc-install: brew
          - target: x86_64-darwin
            runner: macos-15-intel
            lwpt-asset: macos-x64
            fpc-install: brew
            # GH Intel-macOS VMs deliver nw loopback traffic on a ~60s
            # timer (issue #11: transport hops <2ms, transit 12-60s),
            # so the loopback batteries can't run here. Build + unit
            # suites still give x86_64 compile and blocks-ABI coverage.
            loopback-battery: skip
          - target: x86_64-win64
            runner: windows-latest
            lwpt-asset: windows-x64
            lwpt-archive: zip
            fpc-install: choco
            fpc-win-target: x86_64-win64
            exe: .exe
            frozen-install: skip   # lwpt#78: frozen tree-hash not path-portable on Windows
            crosscheck: skip   # python venv on the win runners is a follow-up
          - target: i386-win32
            runner: windows-latest
            lwpt-asset: windows-x86
            lwpt-archive: zip
            fpc-install: choco
            fpc-win-target: i386-win32
            exe: .exe
            frozen-install: skip   # lwpt#78: frozen tree-hash not path-portable on Windows
            crosscheck: skip
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install FPC (apt)
        if: matrix.fpc-install == 'apt'
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc
          fpc -iV

      - name: Install FPC (brew)
        if: matrix.fpc-install == 'brew'
        run: |
          brew install fpc
          fpc -iV

      - name: Install FPC (choco)
        if: matrix.fpc-install == 'choco'
        run: |
          choco install -y freepascal
          # Add the FPC bin to PATH for subsequent steps. Chocolatey has
          # used both C:\fpc and C:\tools\freepascal layouts over time.
          FPC_BIN=""
          for candidate_root in /c/tools/freepascal /c/fpc; do
            if [ -d "$candidate_root" ]; then
              FPC_BIN=$(find "$candidate_root" -name fpc.exe -type f 2>/dev/null | head -1)
              if [ -n "$FPC_BIN" ]; then break; fi
            fi
          done
          if [ -z "$FPC_BIN" ]; then echo "::error::Chocolatey FPC install: fpc.exe not found"; exit 1; fi
          echo "Using FPC at $FPC_BIN"
          echo "$(dirname "$FPC_BIN")" >> "$GITHUB_PATH"
          echo "LWPT_FPC=$(cygpath -w "$FPC_BIN")" >> "$GITHUB_ENV"
          INSTANTFPC_BIN=$(find "$(dirname "$FPC_BIN")" -name instantfpc.exe -type f 2>/dev/null | head -1)
          if [ -n "$INSTANTFPC_BIN" ]; then
            echo "LWPT_INSTANTFPC=$(cygpath -w "$INSTANTFPC_BIN")" >> "$GITHUB_ENV"
          fi
          FPC_UNIT_PATHS=""
          for unit_dir in rtl rtl-objpas rtl-generics rtl-extra fcl-base fcl-process paszlib hash; do
            UNIT_PATH=""
            for unit_target in ${{ matrix.fpc-win-target }} i386-win32 x86_64-win64; do
              UNIT_PATH=$(find /c/tools/freepascal /c/fpc -path "*/units/${unit_target}/${unit_dir}" -type d 2>/dev/null | head -1 || true)
              if [ -n "$UNIT_PATH" ]; then break; fi
            done
            if [ -n "$UNIT_PATH" ]; then
              UNIT_PATH_WIN=$(cygpath -w "$UNIT_PATH")
              if [ -z "$FPC_UNIT_PATHS" ]; then
                FPC_UNIT_PATHS="$UNIT_PATH_WIN"
              else
                FPC_UNIT_PATHS="${FPC_UNIT_PATHS};${UNIT_PATH_WIN}"
              fi
            fi
          done
          echo "LWPT_FPC_UNIT_PATHS=$FPC_UNIT_PATHS" >> "$GITHUB_ENV"
          # win64 legs: use the x86_64 cross backend directly so binaries
          # are genuinely 64-bit (choco's default target is i386-win32; a
          # .cmd wrapper is not CreateProcess-spawnable by lwpt).
          if [ "${{ matrix.fpc-win-target }}" = "x86_64-win64" ]; then
            PPCX64=$(find "$(dirname "$FPC_BIN")" -name ppcrossx64.exe -type f 2>/dev/null | head -1)
            if [ -z "$PPCX64" ]; then
              PPCX64=$(find /c/tools/freepascal /c/fpc -name ppcrossx64.exe -type f 2>/dev/null | head -1)
            fi
            if [ -z "$PPCX64" ]; then echo "::error::ppcrossx64.exe not found in the FPC install"; exit 1; fi
            echo "LWPT_FPC=$(cygpath -w "$PPCX64")" >> "$GITHUB_ENV"
          fi

      - name: Install lwpt (release binary, checksum-verified)
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          ASSET="lwpt-${LWPT_VERSION}-${{ matrix.lwpt-asset }}"
          BASE="https://github.com/frostney/lwpt/releases/download/${LWPT_VERSION}"
          EXT="tar.gz"
          if [ "${{ matrix.lwpt-archive }}" = "zip" ]; then EXT="zip"; fi
          curl -fsSLO "${BASE}/${ASSET}.${EXT}"
          curl -fsSLO "${BASE}/lwpt-${LWPT_VERSION}-checksums.txt"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 -c <(grep "${ASSET}.${EXT}" "lwpt-${LWPT_VERSION}-checksums.txt")
          else
            sha256sum -c <(grep "${ASSET}.${EXT}" "lwpt-${LWPT_VERSION}-checksums.txt")
          fi
          if [ "$EXT" = "zip" ]; then unzip -q "${ASSET}.zip"; else tar xzf "${ASSET}.tar.gz"; fi
          echo "$RUNNER_TEMP/${ASSET}" >> "$GITHUB_PATH"

      - name: lwpt install --frozen (verify lockfile + committed modules)
        if: matrix.frozen-install != 'skip'
        run: lwpt install --frozen

      # Windows: lwpt#78 — the frozen verifier's tree hash is not yet
      # path-portable; mirror lwpt's own Windows CI and install online.
      - name: lwpt install (Windows)
        if: matrix.frozen-install == 'skip'
        run: lwpt install

      - name: lwpt format --check (one runner)
        if: matrix.format-check == true
        run: lwpt format --check

      - name: lwpt build (all programs)
        run: lwpt build

      - name: lwpt test (five co-located unit suites)
        run: lwpt test

      - name: wsinterop (live-socket battery, own client vs own server)
        if: matrix.loopback-battery != 'skip'
        run: ./build/wsinterop${{ matrix.exe }}

      # Cross-implementation net vs the python `websockets` reference,
      # both directions plus raw-socket violations. On the macOS legs
      # this is the merge-time conformance battery for the
      # Network.framework transport — Autobahn needs Docker, which
      # GitHub's macOS runners don't have.
      - name: crosscheck vs python websockets (reference implementation)
        if: matrix.loopback-battery != 'skip' && matrix.crosscheck != 'skip'
        run: |
          python3 -m venv "$RUNNER_TEMP/crosscheck-venv"
          "$RUNNER_TEMP/crosscheck-venv/bin/pip" install --quiet websockets
          PATH="$RUNNER_TEMP/crosscheck-venv/bin:$PATH" python3 tools/crosscheck.py

  autobahn:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install FPC
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc
          fpc -iV

      - name: Install lwpt (release binary, checksum-verified)
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          ASSET="lwpt-${LWPT_VERSION}-linux-x64"
          BASE="https://github.com/frostney/lwpt/releases/download/${LWPT_VERSION}"
          curl -fsSLO "${BASE}/${ASSET}.tar.gz"
          curl -fsSLO "${BASE}/lwpt-${LWPT_VERSION}-checksums.txt"
          shasum -a 256 -c <(grep "${ASSET}.tar.gz" "lwpt-${LWPT_VERSION}-checksums.txt")
          tar xzf "${ASSET}.tar.gz"
          echo "$RUNNER_TEMP/${ASSET}" >> "$GITHUB_PATH"

      - name: lwpt install + build (wsecho + wsautobahn)
        run: |
          lwpt install --frozen
          lwpt build wsecho wsautobahn

      - name: Autobahn fuzzingclient vs wsecho (server under test)
        run: ./tools/autobahn.sh server

      - name: Autobahn fuzzingserver vs wsautobahn (client under test)
        run: ./tools/autobahn.sh client

      - name: Upload Autobahn reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: autobahn-reports
          retention-days: 30
          path: tests/autobahn/reports/
