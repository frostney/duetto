name: CI

# Two-stage post-merge confirmation, mirroring the lwpt / GocciaScript
# CI pattern. Sister workflow:
#
#   pr.yml — every PR: fast Ubuntu-native gate (the authoritative
#            pre-merge signal).
#
# ci.yml runs ONLY on push to main + manual dispatch. PRs do not
# trigger ci.yml — pr.yml owns the PR flow. This avoids the
# duplicate-build cost of triggering on both push and pull_request for
# the same commit; post-merge, ci.yml runs once on main to confirm the
# merged tree is green everywhere.
#
#   test:     Per-platform native runners. Every leg builds all five
#             programs and runs the unit suites, wsinterop's
#             live-socket battery, and the crosscheck against the
#             python `websockets` reference — the server rides the
#             platform transport (epoll on Linux, Network.framework on
#             macOS, where crosscheck is the merge-time conformance
#             battery since the Autobahn container can't run there).
#
#   autobahn: The Autobahn fuzzing suite (crossbario/autobahn-testsuite
#             via Docker) in both directions — fuzzingclient against
#             build/wsecho (server under test) and fuzzingserver
#             against build/wsautobahn (client under test, with and
#             without permessage-deflate). tools/autobahn-check.py
#             fails the job on any non-acceptable case; the full HTML
#             reports are uploaded as an artifact either way.
#
# The lwpt toolchain comes from its published release (checksum-
# verified per-platform tarball, no sibling checkout, no bootstrap);
# dependencies resolve from the same release tag and are verified
# against the committed lockfile + .lwpt/modules tree via
# install --frozen.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  LWPT_VERSION: "0.2.0"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runner: ubuntu-latest
            lwpt-asset: linux-x64
            fpc-install: apt
            format-check: true   # one runner runs format-check (platform-independent)
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
            lwpt-asset: linux-arm64
            fpc-install: apt
          - target: aarch64-darwin
            runner: macos-latest
            lwpt-asset: macos-arm64
            fpc-install: brew
          - target: x86_64-darwin
            runner: macos-15-intel
            lwpt-asset: macos-x64
            fpc-install: brew
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install FPC (apt)
        if: matrix.fpc-install == 'apt'
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc
          fpc -iV

      - name: Install FPC (brew)
        if: matrix.fpc-install == 'brew'
        run: |
          brew install fpc
          fpc -iV

      - name: Install lwpt (release binary, checksum-verified)
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          ASSET="lwpt-${LWPT_VERSION}-${{ matrix.lwpt-asset }}"
          BASE="https://github.com/frostney/lwpt/releases/download/${LWPT_VERSION}"
          curl -fsSLO "${BASE}/${ASSET}.tar.gz"
          curl -fsSLO "${BASE}/lwpt-${LWPT_VERSION}-checksums.txt"
          shasum -a 256 -c <(grep "${ASSET}.tar.gz" "lwpt-${LWPT_VERSION}-checksums.txt")
          tar xzf "${ASSET}.tar.gz"
          echo "$RUNNER_TEMP/${ASSET}" >> "$GITHUB_PATH"

      - name: lwpt install --frozen (verify lockfile + committed modules)
        run: lwpt install --frozen

      - name: lwpt format --check (one runner)
        if: matrix.format-check == true
        run: lwpt format --check

      - name: lwpt build (all programs)
        run: lwpt build

      - name: lwpt test (five co-located unit suites)
        run: lwpt test

      - name: wsinterop (live-socket battery, own client vs own server)
        run: ./build/wsinterop

      # Cross-implementation net vs the python `websockets` reference,
      # both directions plus raw-socket violations. On the macOS legs
      # this is the merge-time conformance battery for the
      # Network.framework transport — Autobahn needs Docker, which
      # GitHub's macOS runners don't have.
      - name: crosscheck vs python websockets (reference implementation)
        run: |
          python3 -m venv "$RUNNER_TEMP/crosscheck-venv"
          "$RUNNER_TEMP/crosscheck-venv/bin/pip" install --quiet websockets
          PATH="$RUNNER_TEMP/crosscheck-venv/bin:$PATH" python3 tools/crosscheck.py

  autobahn:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install FPC
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc
          fpc -iV

      - name: Install lwpt (release binary, checksum-verified)
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          ASSET="lwpt-${LWPT_VERSION}-linux-x64"
          BASE="https://github.com/frostney/lwpt/releases/download/${LWPT_VERSION}"
          curl -fsSLO "${BASE}/${ASSET}.tar.gz"
          curl -fsSLO "${BASE}/lwpt-${LWPT_VERSION}-checksums.txt"
          shasum -a 256 -c <(grep "${ASSET}.tar.gz" "lwpt-${LWPT_VERSION}-checksums.txt")
          tar xzf "${ASSET}.tar.gz"
          echo "$RUNNER_TEMP/${ASSET}" >> "$GITHUB_PATH"

      - name: lwpt install + build (wsecho + wsautobahn)
        run: |
          lwpt install --frozen
          lwpt build wsecho wsautobahn

      - name: Autobahn fuzzingclient vs wsecho (server under test)
        run: ./tools/autobahn.sh server

      - name: Autobahn fuzzingserver vs wsautobahn (client under test)
        run: ./tools/autobahn.sh client

      - name: Upload Autobahn reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: autobahn-reports
          retention-days: 30
          path: tests/autobahn/reports/
