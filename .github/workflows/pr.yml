name: PR

# Fast PR gate. Mirrors the lwpt / GocciaScript pattern: ci.yml runs
# only on push to main, so pr.yml is the sole pre-merge signal a PR
# sees.
#
#   pr.yml — every PR: native install --frozen + format --check + build
#            + test + wsinterop on one Linux and one macOS runner (the
#            two platforms with their own transports — a PR touching
#            WS.Transport.NetworkFramework gets a real pre-merge
#            signal; no Autobahn). A win64 cross-compile signal joins
#            when #3 lands, mirroring lwpt's staging.
#   ci.yml — push to main only: the full per-arch platform matrix plus
#            the Autobahn suite in both directions.
#
# The lwpt toolchain comes from its published release (checksum-
# verified tarball, no sibling checkout, no bootstrap); dependencies
# resolve from the same release tag and are verified against the
# committed lockfile + .lwpt/modules tree via install --frozen.

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  LWPT_VERSION: "0.2.0"

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            lwpt-asset: linux-x64
            fpc-install: apt
          - runner: macos-latest
            lwpt-asset: macos-arm64
            fpc-install: brew
          # Pre-merge Windows carve-out (mirrors lwpt's staging): the
          # {$IFDEF WINDOWS} code never compiles on the other legs, so a
          # win64 leg closes the compile gap and runs the battery
          # natively. i386-win32 stays post-merge in ci.yml.
          - runner: windows-latest
            lwpt-asset: windows-x64
            lwpt-archive: zip
            fpc-install: choco
            fpc-win-target: x86_64-win64
            exe: .exe
            frozen-install: skip   # lwpt#78: frozen tree-hash not path-portable on Windows
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install FPC (apt)
        if: matrix.fpc-install == 'apt'
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc
          fpc -iV

      - name: Install FPC (brew)
        if: matrix.fpc-install == 'brew'
        run: |
          brew install fpc
          fpc -iV

      # The choco package is i386-win32 only (no ppcrossx64); win64 legs
      # install the official native win64 FPC silently instead.
      - name: Install FPC (win64 native)
        if: matrix.fpc-install == 'choco' && matrix.fpc-win-target == 'x86_64-win64'
        shell: pwsh
        run: |
          $url = "https://downloads.freepascal.org/fpc/dist/3.2.2/x86_64-win64/fpc-3.2.2.x86_64-win64.exe"
          Invoke-WebRequest -Uri $url -OutFile fpc64-setup.exe
          Start-Process -Wait -FilePath .pc64-setup.exe -ArgumentList "/VERYSILENT","/NORESTART","/DIR=C:pc64"

      - name: Install FPC (choco)
        if: matrix.fpc-install == 'choco' && matrix.fpc-win-target != 'x86_64-win64'
        run: |
          choco install -y freepascal

      - name: Locate FPC (Windows)
        if: matrix.fpc-install == 'choco'
        run: |
          # Add the FPC bin to PATH for subsequent steps. Chocolatey has
          # used both C:\fpc and C:\tools\freepascal layouts over time.
          FPC_BIN=""
          for candidate_root in /c/fpc64 /c/tools/freepascal /c/fpc; do
            if [ -d "$candidate_root" ]; then
              FPC_BIN=$(find "$candidate_root" -name fpc.exe -type f 2>/dev/null | head -1)
              if [ -n "$FPC_BIN" ]; then break; fi
            fi
          done
          if [ -z "$FPC_BIN" ]; then echo "::error::Chocolatey FPC install: fpc.exe not found"; exit 1; fi
          echo "Using FPC at $FPC_BIN"
          echo "$(dirname "$FPC_BIN")" >> "$GITHUB_PATH"
          echo "LWPT_FPC=$(cygpath -w "$FPC_BIN")" >> "$GITHUB_ENV"
          INSTANTFPC_BIN=$(find "$(dirname "$FPC_BIN")" -name instantfpc.exe -type f 2>/dev/null | head -1)
          if [ -n "$INSTANTFPC_BIN" ]; then
            echo "LWPT_INSTANTFPC=$(cygpath -w "$INSTANTFPC_BIN")" >> "$GITHUB_ENV"
          fi
          FPC_UNIT_PATHS=""
          for unit_dir in rtl rtl-objpas rtl-generics rtl-extra fcl-base fcl-process paszlib hash; do
            UNIT_PATH=""
            for unit_target in ${{ matrix.fpc-win-target }} i386-win32 x86_64-win64; do
              UNIT_PATH=$(find /c/tools/freepascal /c/fpc -path "*/units/${unit_target}/${unit_dir}" -type d 2>/dev/null | head -1 || true)
              if [ -n "$UNIT_PATH" ]; then break; fi
            done
            if [ -n "$UNIT_PATH" ]; then
              UNIT_PATH_WIN=$(cygpath -w "$UNIT_PATH")
              if [ -z "$FPC_UNIT_PATHS" ]; then
                FPC_UNIT_PATHS="$UNIT_PATH_WIN"
              else
                FPC_UNIT_PATHS="${FPC_UNIT_PATHS};${UNIT_PATH_WIN}"
              fi
            fi
          done
          echo "LWPT_FPC_UNIT_PATHS=$FPC_UNIT_PATHS" >> "$GITHUB_ENV"

      - name: Install lwpt (release binary, checksum-verified)
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          ASSET="lwpt-${LWPT_VERSION}-${{ matrix.lwpt-asset }}"
          BASE="https://github.com/frostney/lwpt/releases/download/${LWPT_VERSION}"
          EXT="tar.gz"
          if [ "${{ matrix.lwpt-archive }}" = "zip" ]; then EXT="zip"; fi
          curl -fsSLO "${BASE}/${ASSET}.${EXT}"
          curl -fsSLO "${BASE}/lwpt-${LWPT_VERSION}-checksums.txt"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 -c <(grep "${ASSET}.${EXT}" "lwpt-${LWPT_VERSION}-checksums.txt")
          else
            sha256sum -c <(grep "${ASSET}.${EXT}" "lwpt-${LWPT_VERSION}-checksums.txt")
          fi
          if [ "$EXT" = "zip" ]; then unzip -q "${ASSET}.zip"; else tar xzf "${ASSET}.tar.gz"; fi
          echo "$RUNNER_TEMP/${ASSET}" >> "$GITHUB_PATH"

      - name: lwpt install --frozen (verify lockfile + committed modules)
        if: matrix.frozen-install != 'skip'
        run: lwpt install --frozen

      # Windows: lwpt#78 — the frozen verifier's tree hash is not yet
      # path-portable; mirror lwpt's own Windows CI and install online.
      - name: lwpt install (Windows)
        if: matrix.frozen-install == 'skip'
        run: lwpt install

      - name: lwpt format --check (formatting drift?)
        if: matrix.fpc-install == 'apt'   # platform-independent; one runner
        run: lwpt format --check

      - name: lwpt build (compile every [build] entry)
        run: lwpt build

      - name: lwpt test (five co-located unit suites)
        run: lwpt test

      - name: wsinterop (live-socket battery, own client vs own server)
        run: ./build/wsinterop${{ matrix.exe }}

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"
