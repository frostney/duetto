# duetto — lightweight WebSocket for Pascal (RFC 6455 + RFC 7692)
# Bootstrapped with `lwpt init`; built/tested/formatted via lwpt.

[package]
name = "duetto"
version = "0.1.0"
# lwpt 0.2.0 discovers dep units through nested manifests, so only
# duetto's own source dir is listed here. Dep test files are excluded at
# fetch time so `lwpt test` (which walks every units dir) only
# discovers duetto's own suites; [format] likewise excludes .lwpt so the
# formatter never rewrites fetched modules out from under the lockfile
# hash.
units = ["source/units"]

[format]
exclude = [".lwpt/**"]

[dependencies]
# Resolved from the lwpt 0.2.0 release tag via include filters (one
# filtered fetch per package). httpclient brings HTTPClient +
# TransportSecurity (TLS) + StringBuffer; cli is the option/parser/help
# framework the source/apps programs build their flags on.
httpclient = { source = "frostney/lwpt", version = "^0.2.0", include = ["packages/httpclient/**"], exclude = ["**/*.Test.pas", "**/Tests.*.pas"] }
testing = { source = "frostney/lwpt", version = "^0.2.0", include = ["packages/testing/**"], exclude = ["**/*.Test.pas"] }
cli = { source = "frostney/lwpt", version = "^0.2.0", include = ["packages/cli/**"], exclude = ["**/*.Test.pas"] }

[build]
wsecho    = { source = "source/apps/wsecho.pas",    output = "build/wsecho" }
wsbench   = { source = "source/apps/wsbench.pas",   output = "build/wsbench" }
wsinterop = { source = "source/apps/wsinterop.pas", output = "build/wsinterop" }
wsprobe   = { source = "source/apps/wsprobe.pas",   output = "build/wsprobe" }
wsautobahn = { source = "source/apps/wsautobahn.pas", output = "build/wsautobahn" }
